name: IP Sync

on:
  schedule:
    # 每隔 5 分钟运行一次（你可以根据需要修改时间）
    - cron: '*/5 * * * *'
  # 允许手动点击运行
  workflow_dispatch:

jobs:
  sync-ip:
    runs-on: windows-latest # 因为你的脚本是 .ps1，所以需要用 Windows 环境

    steps:
      # 第一步：下载你的代码
      - name: Checkout code
        uses: actions/checkout@v3

      # 第二步：运行你的 git_sync.ps1 脚本
      - name: Run Sync Script
        shell: pwsh # 使用 PowerShell Core
        run: |
          # 运行脚本
          .\git_sync.ps1
        env:
          # 这里将你在 Settings 里配置的密钥传给脚本
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
